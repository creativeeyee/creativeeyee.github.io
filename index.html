<script>

/* KEEP YOUR EXISTING FUNCTIONS */
function openWindow(id){
  document.getElementById(id).style.display = "block";
}

function closeWindow(id){
  document.getElementById(id).style.display = "none";
}

/* FIX STARTS HERE — SAFE + ISOLATED */
window.onload = function() {

  const icons = document.querySelectorAll(".icon");

  icons.forEach(icon => {

    /* RANDOM POSITION (ONLY ON LOAD, SAFE LIMITS) */
    if (!icon.style.left) {
      const padding = 120;
      const x = Math.random() * (window.innerWidth - padding);
      const y = Math.random() * (window.innerHeight - 180);

      icon.style.left = x + "px";
      icon.style.top = y + "px";
    }

    let offsetX = 0;
    let offsetY = 0;
    let isDragging = false;
    let moved = false;

    /* DRAG START (LEFT CLICK HOLD) */
    icon.addEventListener("mousedown", function(e) {
      if (e.button !== 0) return;

      isDragging = true;
      moved = false;

      offsetX = e.clientX - icon.offsetLeft;
      offsetY = e.clientY - icon.offsetTop;

      document.body.style.userSelect = "none";
    });

    /* DRAG MOVE */
    document.addEventListener("mousemove", function(e) {
      if (!isDragging) return;

      moved = true;

      icon.style.left = (e.clientX - offsetX) + "px";
      icon.style.top = (e.clientY - offsetY) + "px";
    });

    /* DRAG END */
    document.addEventListener("mouseup", function() {
      isDragging = false;
      document.body.style.userSelect = "auto";
    });

    /* ONLY DOUBLE CLICK OPENS */
    icon.addEventListener("dblclick", function() {
      if (moved) return;

      const action = icon.getAttribute("onclick");
      if (action) eval(action);
    });

    /* REMOVE 🚫 BROWSER DRAG */
    icon.ondragstart = () => false;

  });

};

</script>
