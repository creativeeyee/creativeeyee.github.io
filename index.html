<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avi Desktop</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:url('bg.jpg') center/cover no-repeat;
  overflow:hidden;
}

/* ICON */
.icon {
  position:absolute;
  width:90px;
  text-align:center;
  cursor:pointer;
  color:white;
}

.icon img {
  width:50px;
}

.icon p {
  font-size:12px;
}

/* WINDOW */
.window {
  position:absolute;
  top:80px;
  left:200px;
  width:600px;
  height:450px;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius:15px;
  padding:20px;
  display:none;
}

.close {
  position:absolute;
  right:10px;
  top:10px;
  width:12px;
  height:12px;
  background:red;
  border-radius:50%;
  cursor:pointer;
}

/* GALLERY */
.gallery {
  display:flex;
  flex-wrap:wrap;
}

.gallery img {
  width:120px;
  margin:10px;
  cursor:pointer;
}

/* VIEWER */
.viewer {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
}

.viewer img {
  max-width:90%;
  max-height:90%;
}

/* SOCIAL BAR */
.social {
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}

.social img {
  width:40px;
  margin:0 10px;
}
</style>

</head>

<body>

<!-- ICONS -->
<div class="icon" onclick="openFolder('social_media')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Social Media</p>
</div>

<div class="icon" onclick="openFolder('banners')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Banners</p>
</div>

<div class="icon" onclick="openFolder('posters')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Posters</p>
</div>

<div class="icon" onclick="openFolder('brochures')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Brochures</p>
</div>

<div class="icon" onclick="openFolder('visualization')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>3D Visualization</p>
</div>

<div class="icon" onclick="openFolder('tiles')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Tiles</p>
</div>

<div class="icon" onclick="openFolder('motion')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Motion & Video</p>
</div>

<div class="icon" onclick="openFolder('photography')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Photography</p>
</div>

<div class="icon" onclick="openFolder('branding')">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Branding</p>
</div>

<div class="icon" onclick="window.open('resume.pdf')">
  <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png">
  <p>Resume</p>
</div>

<!-- WINDOW -->
<div class="window" id="window">
  <div class="close" onclick="closeWindow()"></div>
  <div id="content"></div>
</div>

<!-- VIEWER -->
<div class="viewer" id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<!-- SOCIAL -->
<div class="social">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
  <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</div>

<script>

// RANDOM CLUTTER 💥
document.querySelectorAll('.icon').forEach(icon=>{
  icon.style.left = Math.random()*90 + "vw";
  icon.style.top = Math.random()*80 + "vh";
});

// LOAD JSON
let data={};
fetch("data.json").then(r=>r.json()).then(d=>data=d);

// OPEN FOLDER
function openFolder(name){
  let html='<div class="gallery">';
  data[name].forEach(img=>{
    html+=`<img src="${img}" onclick="openViewer('${img}')">`;
  });
  html+='</div>';

  document.getElementById("window").style.display="block";
  document.getElementById("content").innerHTML=html;
}

// CLOSE
function closeWindow(){
  document.getElementById("window").style.display="none";
}

// VIEWER
function openViewer(src){
  viewer.style.display="flex";
  viewerImg.src=src;
}

function closeViewer(){
  viewer.style.display="none";
}

</script>

</body>
</html>
