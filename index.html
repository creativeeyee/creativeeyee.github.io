<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avi OS</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: url('bg.jpg') center/cover no-repeat;
  overflow: hidden;
}

/* ICON */
.icon {
  position: absolute;
  text-align: center;
  cursor: grab;
  user-select: none;
}

.icon img {
  width: 60px;
}

.icon p {
  margin: 5px 0 0;
  font-size: 14px;
  color: black;
}

/* WINDOW */
.window {
  position: absolute;
  width: 420px;
  height: 320px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  border-radius: 15px;
  padding: 10px;
  top: 100px;
  left: 100px;
  overflow: auto;
}

.close {
  position: absolute;
  top: 5px;
  right: 10px;
  cursor: pointer;
  color: red;
  font-size: 18px;
}

/* IMAGES */
.thumb {
  width: 100px;
  margin: 10px;
  cursor: pointer;
}

/* VIEWER */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
}

.viewer img {
  max-width: 80%;
  max-height: 80%;
}

/* DOCK */
.dock {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  padding: 10px 20px;
  border-radius: 30px;
}

.dock img {
  width: 40px;
  margin: 0 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- ICONS -->
<div class="icon" id="portfolio" ondblclick="loadPortfolio()">
  <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
  <p>Portfolio</p>
</div>

<div class="icon" id="resume" ondblclick="openResume()">
  <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png">
  <p>Resume</p>
</div>

<div class="icon" id="games" ondblclick="openGame()">
  <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">
  <p>Games</p>
</div>

<!-- DOCK -->
<div class="dock">
  <a href="https://wa.me/919537235783"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
  <a href="mailto:avinash.nair274@gmail.com"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"></a>
  <a href="https://www.instagram.com/creeativeye"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
  <a href="https://www.linkedin.com/in/avinash-nair-720230104"><img src="https://cdn-icons-png.flaticon.com/512/145/145807.png"></a>
  <a href="https://www.behance.net/avinashnair274"><img src="https://cdn-icons-png.flaticon.com/512/733/733609.png"></a>
  <a href="https://dribbble.com/AvinashNair"><img src="https://cdn-icons-png.flaticon.com/512/733/733544.png"></a>
</div>

<script>

/* RANDOM POSITION */
function randomPosition(el) {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 150);
  el.style.left = x + "px";
  el.style.top = y + "px";
}

randomPosition(document.getElementById("portfolio"));
randomPosition(document.getElementById("resume"));
randomPosition(document.getElementById("games"));

/* DRAG */
document.querySelectorAll(".icon").forEach(icon => {
  let offsetX, offsetY;

  icon.addEventListener("mousedown", (e) => {
    offsetX = e.offsetX;
    offsetY = e.offsetY;

    function move(e) {
      icon.style.left = (e.pageX - offsetX) + "px";
      icon.style.top = (e.pageY - offsetY) + "px";
    }

    document.addEventListener("mousemove", move);

    document.addEventListener("mouseup", () => {
      document.removeEventListener("mousemove", move);
    }, { once: true });
  });
});

/* WINDOW */
function createWindow(title) {
  const win = document.createElement("div");
  win.className = "window";

  const close = document.createElement("div");
  close.className = "close";
  close.innerText = "●";
  close.onclick = () => win.remove();

  const content = document.createElement("div");

  win.appendChild(close);
  win.appendChild(content);
  document.body.appendChild(win);

  win.content = content;
  return win;
}

/* NAME FORMAT */
function formatName(name) {
  return name
    .replaceAll("_", " ")
    .replace(/\b\w/g, l => l.toUpperCase());
}

/* LOAD PORTFOLIO */
async function loadPortfolio() {
  const res = await fetch("data.json");
  const data = await res.json();
  openFolder("Portfolio", data.portfolio);
}

/* OPEN FOLDER */
function openFolder(name, content) {
  const win = createWindow(name);

  for (let key in content) {
    const item = content[key];

    const icon = document.createElement("div");
    icon.className = "icon";

    if (Array.isArray(item)) {
      icon.innerHTML = "🖼️<p>" + formatName(key) + "</p>";
      icon.ondblclick = () => openImages(key, item);
    } else {
      icon.innerHTML = "📁<p>" + formatName(key) + "</p>";
      icon.ondblclick = () => openFolder(key, item);
    }

    win.content.appendChild(icon);
  }
}

/* OPEN IMAGES */
function openImages(title, images) {
  const win = createWindow(title);

  win.content.style.display = "flex";
  win.content.style.flexWrap = "wrap";
  win.content.style.justifyContent = "center";

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "thumb";

    img.onclick = () => openViewer(src);

    win.content.appendChild(img);
  });
}

/* VIEWER */
function openViewer(src) {
  const viewer = document.createElement("div");
  viewer.className = "viewer";

  const img = document.createElement("img");
  img.src = src;

  viewer.appendChild(img);
  viewer.onclick = () => viewer.remove();

  document.body.appendChild(viewer);
}

/* RESUME */
function openResume() {
  window.open("resume.pdf");
}

/* GAME */
function openGame() {
  const win = createWindow("Mini Game ❤️");

  const btn = document.createElement("button");
  btn.innerText = "Play";

  btn.onclick = () => alert("Game coming soon 😎");

  win.content.appendChild(btn);
}

</script>

</body>
</html>
