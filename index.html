<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avi OS</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: url('bg.jpg') center/cover no-repeat;
  overflow: hidden;
}

/* ICONS */
.icon {
  position: absolute;
  text-align: center;
  cursor: grab;
  color: black;
  user-select: none;
}

.icon img {
  width: 60px;
}

.icon p {
  margin: 5px 0 0;
  font-size: 14px;
}

/* WINDOWS */
.window {
  position: absolute;
  width: 400px;
  height: 300px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  border-radius: 15px;
  padding: 10px;
  top: 100px;
  left: 100px;
  overflow: auto;
}

.close {
  position: absolute;
  top: 5px;
  right: 10px;
  cursor: pointer;
  color: red;
}

/* IMAGE GRID */
.thumb {
  width: 100px;
  margin: 10px;
  cursor: pointer;
}

/* VIEWER */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
}

.viewer img {
  max-width: 80%;
  max-height: 80%;
  transition: transform 0.2s;
}

/* DOCK */
.dock {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  padding: 10px 20px;
  border-radius: 30px;
}

.dock img {
  width: 40px;
  margin: 0 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- DESKTOP ICONS -->
<div class="icon" style="top:50px; left:50px;" ondblclick="loadPortfolio()">📁<p>Portfolio</p></div>

<div class="icon" style="top:150px; left:50px;" ondblclick="openResume()">📄<p>Resume</p></div>

<div class="icon" style="top:250px; left:50px;" ondblclick="openGame()">❤️<p>Games</p></div>

<!-- DOCK -->
<div class="dock">
  <a href="https://wa.me/919537235783"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
  <a href="mailto:avinash.nair274@gmail.com"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"></a>
  <a href="https://www.instagram.com/creeativeye"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
  <a href="https://www.linkedin.com/in/avinash-nair-720230104"><img src="https://cdn-icons-png.flaticon.com/512/145/145807.png"></a>
  <a href="https://www.behance.net/avinashnair274"><img src="https://cdn-icons-png.flaticon.com/512/733/733609.png"></a>
  <a href="https://dribbble.com/AvinashNair"><img src="https://cdn-icons-png.flaticon.com/512/733/733544.png"></a>
</div>

<script>

/* DRAG SYSTEM */
document.querySelectorAll(".icon").forEach(icon => {
  let offsetX, offsetY, isDragging = false;

  icon.addEventListener("mousedown", (e) => {
    isDragging = false;
    offsetX = e.offsetX;
    offsetY = e.offsetY;

    function move(e) {
      isDragging = true;
      icon.style.left = (e.pageX - offsetX) + "px";
      icon.style.top = (e.pageY - offsetY) + "px";
    }

    document.addEventListener("mousemove", move);

    document.addEventListener("mouseup", () => {
      document.removeEventListener("mousemove", move);
    }, { once: true });
  });
});

/* WINDOW */
function createWindow(title) {
  const win = document.createElement("div");
  win.className = "window";

  const close = document.createElement("div");
  close.className = "close";
  close.innerText = "●";
  close.onclick = () => win.remove();

  const content = document.createElement("div");

  win.appendChild(close);
  win.appendChild(content);
  document.body.appendChild(win);

  win.content = content;
  return win;
}

/* PORTFOLIO */
async function loadPortfolio() {
  const res = await fetch("data.json");
  const data = await res.json();

  openFolder("Portfolio", data.portfolio);
}

function openFolder(name, content) {
  const win = createWindow(name);

  for (let key in content) {
    const item = content[key];

    const icon = document.createElement("div");
    icon.className = "icon";

    if (Array.isArray(item)) {
      icon.innerHTML = "🖼️<p>" + key + "</p>";
      icon.ondblclick = () => openImages(key, item);
    } else {
      icon.innerHTML = "📁<p>" + key + "</p>";
      icon.ondblclick = () => openFolder(key, item);
    }

    win.content.appendChild(icon);
  }
}

function openImages(title, images) {
  const win = createWindow(title);

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "thumb";

    img.onclick = () => openViewer(src);

    win.content.appendChild(img);
  });
}

/* IMAGE VIEWER */
function openViewer(src) {
  const viewer = document.createElement("div");
  viewer.className = "viewer";

  const img = document.createElement("img");
  img.src = src;

  let scale = 1;

  viewer.appendChild(img);

  viewer.onwheel = (e) => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(1, scale), 5);
    img.style.transform = `scale(${scale})`;
  };

  viewer.onclick = () => viewer.remove();

  document.body.appendChild(viewer);
}

/* RESUME */
function openResume() {
  window.open("resume.pdf");
}

/* GAME */
function openGame() {
  const win = createWindow("Mini Game ❤️");

  const btn = document.createElement("button");
  btn.innerText = "Play";

  btn.onclick = () => alert("Game coming soon 😎");

  win.content.appendChild(btn);
}

</script>

</body>
</html>
